<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 오늘 저녁 뭐 먹지?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/icon.png">
</head>
<body>

    <div class="bg-stars"></div>

    <header class="header">
        <img src="images/logo.png" alt="Gary's Dining Space" class="logo-img">
    </header>

    <div class="location-bar">
        <span>📍</span>
        <span id="location-text">위치를 불러오는 중...</span>
        <button id="refresh-location" class="icon-btn" title="위치 새로고침">🔄</button>
    </div>

    <div class="controls">
        <div class="radius-selector">
            <button class="radius-btn" data-radius="500">500m</button>
            <button class="radius-btn active" data-radius="1000">1km</button>
            <button class="radius-btn" data-radius="2000">2km</button>
        </div>

    </div>

    <!-- 슬롯머신 -->
    <div class="slot-machine-wrapper">
        <div class="slot-machine">

            <!-- 머신 상단 -->
            <div class="machine-top">
                <div class="light-row">
                    <span class="light"></span>
                    <span class="light"></span>
                    <span class="light"></span>
                    <span class="light"></span>
                    <span class="light"></span>
                </div>
                <div class="machine-title">Dining space</div>
            </div>

            <!-- 릴 영역 -->
            <div class="machine-body">
                <div class="reel-container">
                    <div class="reel-window">
                        <div id="reel" class="reel"></div>
                        <div class="reel-center-highlight"></div>
                    </div>
                </div>
            </div>

            <!-- 하단 버튼 영역 -->
            <div class="machine-bottom">
                <div id="result-count" class="result-count">위치 확인 중...</div>
                <button id="spin-btn" class="spin-btn" disabled>
                    <span class="spin-btn-text">🍽️ Pick me !</span>
                </button>
            </div>

        </div>
    </div>

    <!-- 결과 모달 -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-overlay" id="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <div class="winner-badge">🎉 오늘의 선택!</div>
                <button class="modal-close" id="modal-close">✕</button>
            </div>

            <div class="res-title-area">
                <div class="restaurant-name" id="res-name">-</div>
                <span class="res-cat-chip" id="res-cat-chip"></span>
            </div>
            <div class="restaurant-category" id="res-category">-</div>

            <div class="restaurant-info">
                <div class="info-row">
                    <span class="info-icon">📍</span>
                    <span id="res-address">-</span>
                </div>
                <div class="info-row">
                    <span class="info-icon">🚶</span>
                    <span id="res-walk">-</span>
                </div>
                <div class="info-row">
                    <span class="info-icon">📏</span>
                    <span id="res-distance">-</span>
                </div>
            </div>

            <div id="mini-map" class="mini-map"></div>

            <div class="modal-actions">
                <button type="button" class="action-btn navi-btn" id="navi-btn">🗺️ 길찾기</button>
                <button type="button" class="action-btn retry-btn" id="retry-btn">🔄 다시!</button>
                <a type="button" class="action-btn kakaomap-btn" id="kakaomap-btn" href="#" target="_blank">🏪 가게정보</a>
            </div>
        </div>
    </div>

    <!-- 위치 오류 모달 -->
    <div id="location-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-small">
            <div class="modal-header">
                <div class="winner-badge" style="background: linear-gradient(135deg,#ff6b9d,#ff4081);color:white;">📍 위치 권한 필요</div>
            </div>
            <p style="color:rgba(255,255,255,0.8);font-size:14px;line-height:1.6;margin:16px 0;">
                주변 맛집을 찾으려면<br>위치 접근 권한이 필요해요!<br><br>
                브라우저 주소창 옆 🔒 아이콘을 눌러<br>위치 권한을 허용해주세요.
            </p>
            <button class="action-btn retry-btn" id="location-retry" style="width:100%;">🔄 다시 시도</button>
        </div>
    </div>

    <div id="confetti-container"></div>

    <!-- 카카오맵 SDK: YOUR_KAKAO_JS_KEY 부분을 실제 JavaScript 앱 키로 교체 -->
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=2c7b98e72ee75afdcb3db85c2b4b9137&libraries=services">
    </script>
    <script src="js/location.js"></script>
    <script src="js/kakao-map.js"></script>
    <script src="js/roulette.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
